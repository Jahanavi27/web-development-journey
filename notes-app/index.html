<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Notes App</h1>

    <div class="input-section">
        <input
            type="text"
            id="noteInput"
            placeholder="Enter note">

        <button onclick="addNote()">
            Add Note
        </button>
    </div>

    <input
    type="text"
    id="searchInput"
    placeholder="Search Notes"
    onkeyup="searchNotes()">
    
    <ul id="noteList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
