<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Expense Tracker</h1>

    <input
        type="text"
        id="description"
        placeholder="Expense Description">

    <input
        type="number"
        id="amount"
        placeholder="Amount">

    <button onclick="addExpense()">
        Add Expense
    </button>

    <ul id="expenseList"></ul>

    <h2 id="total">
        Total: ₹0
    </h2>

</div>

<script src="script.js"></script>

</body>
</html>
